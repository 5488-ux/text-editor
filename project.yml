name: TextEditor
options:
  bundleIdPrefix: com.5488ux
  developmentLanguage: zh-Hans
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1

targets:
  TextEditor:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: TextEditorApp
    info:
      path: TextEditorApp/Info.plist
      properties:
        CFBundleDisplayName: 文本编辑器
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIUserInterfaceStyle: Automatic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.5488ux.texteditor
        INFOPLIST_FILE: TextEditorApp/Info.plist
        TARGETED_DEVICE_FAMILY: 1,2
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GLOBAL_APP_ICON_NAME: AppIcon

