name: TextEditor

options:
  bundleIdPrefix: com.5488ux
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.5488ux.texteditor
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1

targets:
  TextEditor:
    type: application
    platform: iOS
    sources:
      - path: TextEditorApp
    settings:
      base:
        INFOPLIST_FILE: TextEditorApp/Info.plist
        TARGETED_DEVICE_FAMILY: 1,2
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GLOBAL_APP_ICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          DEVELOPMENT_TEAM: $(IOS_TEAM_ID)
          PRODUCT_BUNDLE_IDENTIFIER: $(IOS_BUNDLE_ID)
          PROVISIONING_PROFILE_SPECIFIER: $(IOS_PROFILE_NAME)
    scheme:
      testTargets: []
    info:
      path: TextEditorApp/Info.plist
      properties:
        CFBundleDisplayName: 文本编辑器
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIUserInterfaceStyle: Automatic

